# ═══════════════════════════════════════════════════════════════════════
#  Polymarket V2 Indexer — Schema
# ═══════════════════════════════════════════════════════════════════════

# ── Market Metadata (enriched via Gamma API) ────────────────────────

type Market {
  id: ID!                              # tokenId (decimal string)
  question: String!
  slug: String!
  outcomes: String!                    # JSON array e.g. '["Yes","No"]'
  outcomePrices: String!               # JSON array e.g. '["0.6","0.4"]'
  description: String!
  image: String!
  startDate: String!
  endDate: String!
  conditionId: String!
  fills: [OrderFill!]! @derivedFrom(field: "market")
  matches: [OrderMatch!]! @derivedFrom(field: "market")
}

# ── Trading ─────────────────────────────────────────────────────────

type OrderFill {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  orderHash: String!
  maker: String!
  taker: String!
  side: Int!                           # 0=BUY, 1=SELL
  tokenId: BigInt!                     # conditional token ID
  market: Market                       # enriched from Gamma API
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
  fee: BigInt!
  builder: String!                     # builder code (bytes32)
  metadata: String!                    # metadata (bytes32)
  exchange: String!                    # source exchange address
  timestamp: Int!
  txFrom: String!                      # transaction sender
}

type OrderMatch {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  takerOrderHash: String!
  takerOrderMaker: String!
  side: Int!                           # 0=BUY, 1=SELL
  tokenId: BigInt!
  market: Market                       # enriched from Gamma API
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
  exchange: String!
  timestamp: Int!
}

type FeeEvent {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  receiver: String!
  amount: BigInt!
  timestamp: Int!
}

# ── PolyUSD ─────────────────────────────────────────────────────────

type PolyUSDTransfer {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  from: String!
  to: String!
  amount: BigInt!
  timestamp: Int!
}

type PolyUSDWrap {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  eventType: String!                   # "wrap" | "unwrap"
  caller: String!
  asset: String!                       # underlying asset (USDC or USDC.e)
  to: String!
  amount: BigInt!
  timestamp: Int!
}

type PolyUSDAccount {
  id: ID!                              # address
  balance: BigInt!
  totalWrapped: BigInt!
  totalUnwrapped: BigInt!
}

# ── Rewards ─────────────────────────────────────────────────────────

type RewardDistribution {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  user: String!
  amount: BigInt!
  timestamp: Int!
}

type SponsoredMarket {
  id: ID!                              # marketId (bytes32)
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  startTime: Int!
  minSponsorDuration: Int!
  minSponsorAmount: BigInt!
  marketData: String!
  closed: Boolean!
  closedAt: Int
  createdAt: Int!
  createdAtBlock: Int!
}

type Sponsorship {
  id: ID!                              # txHash-logIndex
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  market: SponsoredMarket!
  sponsor: String!
  amount: BigInt!
  startTime: Int!
  endTime: Int!
  ratePerMinute: BigInt!
  withdrawn: Boolean!
  returnedAmount: BigInt
  consumedAmount: BigInt
  isEarlyWithdraw: Boolean
  timestamp: Int!
}

# ── Aggregate Stats ─────────────────────────────────────────────────

type ExchangeStats {
  id: ID!                              # exchange address
  totalOrdersFilled: BigInt!
  totalOrdersMatched: BigInt!
  totalVolume: BigInt!
  totalFees: BigInt!
  totalBuilderFills: BigInt!           # fills with non-zero builder code
}

type PolyUSDStats {
  id: ID!                              # "polyusd"
  totalSupply: BigInt!
  totalWrapped: BigInt!
  totalUnwrapped: BigInt!
  totalTransfers: BigInt!
}

type DepositWallet {
  id: ID!
  blockNumber: BigInt! @index
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  timestamp: BigInt! @index
  wallet: String! @index
  owner: String! @index
  walletId: String! @index
  implementation: String!
}

# ── Collateral Ramps ───────────────────────────────────────────────

type CollateralRampPaused {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  timestamp: BigInt!
  ramp: String!
  asset: String!
}

type CollateralRampUnpaused {
  id: ID!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  logIndex: Int!
  transactionHash: String!
  timestamp: BigInt!
  ramp: String!
  asset: String!
}
